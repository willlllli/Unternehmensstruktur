services:
  db:
    image: postgres:16
    container_name: unternehmensstruktur-db
    pull_policy: always  # Immer neueste Version pullen
    environment:
      POSTGRES_DB: unternehmenshierarchie
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./database/create.sql:/docker-entrypoint-initdb.d/01_create.sql
      - ./database/insert.sql:/docker-entrypoint-initdb.d/02_insert.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  app:
    image: ghcr.io/willlllli/unternehmensstruktur:latest
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/unternehmenshierarchie
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
    depends_on:
      db:
        condition: service_healthy
