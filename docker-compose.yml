services:
  db:
    image: ghcr.io/willlllli/unternehmensstruktur-db:latest
    container_name: unternehmensstruktur-db
    pull_policy: always
    environment:
      POSTGRES_DB: unternehmenshierarchie
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  app:
    image: ghcr.io/willlllli/unternehmensstruktur:latest
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/unternehmenshierarchie
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
    depends_on:
      db:
        condition: service_healthy
