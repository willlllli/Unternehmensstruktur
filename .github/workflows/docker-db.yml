name: Build and Push DB Image

on:
  push:
    branches: [main]
    paths:
      - 'database/Dockerfile'
      - 'database/create.sql'
      - 'database/insert.sql'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./database
          push: true
          tags: ghcr.io/willlllli/unternehmensstruktur-db:latest
